<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover" />
    <title>NewscannerMAUI</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="NewscannerMAUI.styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="loading.css" />
    <style>
        /* Global Uppercase Style - Visual Only to prevent Keyboard Lag */
        .force-uppercase, .force-uppercase input {
            text-transform: uppercase !important;
        }
    </style>
</head>

<body>


    <div id="app">
        <div class="sardo-loading-screen">
            <div class="qr-container">
                <img src="Sardoicon.png" alt="Sardo Icon" class="sardo-icon-loading" />
                <div class="scan-line"></div>
                <div class="scan-glow"></div>
            </div>
            <div class="app-brand">
                <h1>SARDO-<span>TRAKCARE</span></h1>
                <div class="loading-text">Scanning System...</div>
            </div>
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <script>
        // ─── KEYBOARD SCROLL FIX (Android) ───────────────────────────────────────
        // Scrolls the focused element into view ONLY if it is actually hidden
        // by the keyboard. Uses visualViewport for modern Android WebView.

        function ensureFocusedVisible() {
            var el = document.activeElement;
            if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) return;

            var rect = el.getBoundingClientRect();
            var viewHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

            // If the bottom of the input is below the visible area (hidden by keyboard)
            // or very close to it, scroll it up with breathing room.
            if (rect.bottom > viewHeight - 20) {
                var offset = rect.bottom - viewHeight + 100; // 100px extra breathing room
                window.scrollBy({ top: offset, left: 0, behavior: 'smooth' });
            }
        }

        // Modern API – fires when keyboard opens/closes (Android Chrome 61+)
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', function () {
                // Short delay to let the layout settle
                setTimeout(ensureFocusedVisible, 80);
            });
            
            // Helpful for layouts that use 100vh - adjust body to visualViewport
            window.visualViewport.addEventListener('resize', function () {
                document.documentElement.style.setProperty(
                    '--keyboard-gap',
                    Math.max(0, window.innerHeight - window.visualViewport.height) + 'px'
                );
            });
        }

        // Fallback – fires on focus for older Android WebViews
        document.addEventListener('focusin', function (e) {
            var el = e.target;
            if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
                setTimeout(ensureFocusedVisible, 350);
                setTimeout(ensureFocusedVisible, 700);
            }
        }, true);

        // Report Download Helper - works on Android MAUI WebView
        window.downloadHtmlReport = function (htmlContent, filename) {
            try {
                var blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8;' });
                var url = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', filename);
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            } catch(e) {
                console.error('Download error:', e);
                // Fallback: open in new tab
                var win = window.open();
                if (win) { win.document.write(htmlContent); win.document.close(); }
            }
        }
    </script>
</body>

</html>
